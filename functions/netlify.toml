# AI 기상정보 대응 시스템 — Netlify 배포 설정
# 정적 프론트(dist) + 서버리스 함수(netlify/functions)
# 실데이터 연동에 필요한 환경변수(Netlify UI에서 설정, 코드에 커밋 금지):
#   KMA_SERVICE_KEY   기상청 공공데이터포털 서비스키
#   KAKAO_REST_KEY        Kakao Local REST 키 (/api/geocode)
#   KAKAO_REST_API_KEY    Kakao Local REST 키 (/api/kakao-geocode)
#   KMA_FORECAST_API_URL  기상청 단기예보 API URL
#   KMA_WARNING_API_URL   기상청 기상특보 API URL
[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"


[[redirects]]
  from = "/api/weather"
  to = "/.netlify/functions/weather"
  status = 200

[[redirects]]
  from = "/api/geocode"
  to = "/.netlify/functions/geocode"
  status = 200

[[redirects]]
  from = "/api/kma-forecast"
  to = "/.netlify/functions/kma-forecast"
  status = 200

[[redirects]]
  from = "/api/kma-warnings"
  to = "/.netlify/functions/kma-warnings"
  status = 200

[[redirects]]
  from = "/api/kakao-geocode"
  to = "/.netlify/functions/kakao-geocode"
  status = 200